<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moxela App | New Contact</title>
    <link rel="stylesheet" href="Styles.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div>
            <div class="logo">Moxela App</div>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="new_contact.html" class="active">New Contact</a></li>
                <li><a href="view_contact.html">View Contacts</a></li>
            </ul>
        </div>
    </nav>

    <h1>New Contact</h1>

    <form id="contactForm">
        <label for="idNumber">ID Number:</label>
        <input type="text" id="idNumber" placeholder="Enter your ID Number" required>

        <label for="firstName">First Name:</label>
        <input type="text" id="firstName" placeholder="Enter your First Name" required>

        <label for="lastName">Last Name:</label>
        <input type="text" id="lastName" placeholder="Enter your Last Name" required>

        <p>Gender:</p>
        <label><input type="radio" name="gender" value="Male" required> Male</label>
        <label><input type="radio" name="gender" value="Female" required> Female</label>
        <br><br>

        <label for="address">Address:</label>
        <input type="text" id="address" placeholder="Enter your Address" required>

        <label for="dob">Date of Birth:</label>
        <input type="date" id="dob" required>

        <label for="position">Position:</label>
        <input type="text" id="position" placeholder="Enter position if official" required>

        <button type="submit" class="btn details">Submit</button>
    </form>

    <!-- Link main.js -->
    <script src="main.js"></script>
</body>
</html>
